    <text x="50.0" y="54.5" text-anchor="middle" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif, &quot;Apple Color Emoji&quot;, &quot;Segoe UI Emoji&quot;, &quot;Noto Color Emoji&quot;, &quot;Twemoji Mozilla&quot;" font-size="12.0px" fill="#333333">places</text>
  </g>
  <g class="er-relationship" data-edge-source="ORDER" data-edge-target="LINE-ITEM">
