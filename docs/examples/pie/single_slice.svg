<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 390" width="660" height="390">
<style>
.pie-title { font-family: sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
.pie-label { font-family: sans-serif; font-size: 12px; text-anchor: middle; fill: #333; }
.pie-legend { font-family: sans-serif; font-size: 14px; fill: #333; }
.pie-slice { stroke: #fff; stroke-width: 2; }
</style>
<text x="200" y="25" class="pie-title">Full Circle</text>
<circle cx="200" cy="240" r="150" fill="#4572A7" class="pie-slice" data-slice-label="Everything"/>
<rect x="390" y="50" width="16" height="16" fill="#4572A7" class="pie-legend"/>
<text x="412" y="63" class="pie-legend">Everything: 100.0%</text>
</svg>