<svg xmlns="http://www.w3.org/2000/svg" viewBox="-87.65 -20 727.2 671.4" width="727.2" height="671.4" style="background-color: white">
  <defs>
    <marker id="seq-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333" />
    </marker>
    <marker id="seq-arrow-open" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
    <marker id="seq-cross" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#333333" stroke-width="2" />
      <line x1="10" y1="0" x2="0" y2="10" stroke="#333333" stroke-width="2" />
    </marker>
    <marker id="seq-async" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
  </defs>
  <style>.seq-participant rect { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-participant text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
.seq-lifeline { stroke: #9370DB; stroke-width: 1; stroke-dasharray: 5,5; }
.seq-message line, .seq-message path { stroke: #333333; stroke-width: 2; }
.seq-message text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-activation { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-note rect { fill: #ffffcc; stroke: #aaaa33; stroke-width: 1; }
.seq-note text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-fragment rect { fill: none; stroke: #9370DB; stroke-width: 1; stroke-dasharray: 3,3; }
.seq-fragment text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 11px; font-weight: bold; }
.seq-actor line, .seq-actor circle { stroke: #9370DB; stroke-width: 1; fill: none; }
.seq-actor text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
</style>
  <line class="seq-lifeline" x1="70" y1="60" x2="70" y2="611.4" />
  <line class="seq-lifeline" x1="220" y1="60" x2="220" y2="611.4" />
  <line class="seq-lifeline" x1="370" y1="60" x2="370" y2="611.4" />
  <line class="seq-lifeline" x1="520" y1="60" x2="520" y2="611.4" />
  <g class="seq-message">
    <line x1="70" y1="100" x2="220" y2="100" marker-end="url(#seq-arrow)" />
    <text x="145" text-anchor="middle" y="95">Event A (ts=14:00:07, on time)</text>
  </g>
  <g class="seq-message">
    <line x1="220" y1="140" x2="370" y2="140" marker-end="url(#seq-arrow)" />
    <text x="295" text-anchor="middle" y="135">Event A</text>
  </g>
  <g class="seq-message">
    <line x1="70" y1="288.8" x2="220" y2="288.8" marker-end="url(#seq-arrow)" />
    <text x="145" text-anchor="middle" y="283.8">Event B (ts=14:00:04, 8s late)</text>
  </g>
  <g class="seq-message">
    <line x1="220" y1="328.8" x2="370" y2="328.8" marker-end="url(#seq-arrow)" />
    <text x="295" text-anchor="middle" y="323.8">Event B</text>
  </g>
  <g class="seq-message">
    <line x1="370" y1="516.4" x2="520" y2="516.4" marker-end="url(#seq-arrow)" />
    <text x="445" text-anchor="middle" y="511.4">INSERT (window=00:00, PU=79, trips=2)</text>
  </g>
  <g class="seq-note">
    <rect x="209.6" y="180" width="320.8" height="68.8" rx="3" />
    <text text-anchor="middle" x="370" y="198.4" dominant-baseline="central">
      <tspan x="370" dy="0">watermark = 00:02</tspan>
      <tspan x="370" dy="16">window [00:00, 00:10) not published yet</tspan>
      <tspan x="370" dy="16">A added to window</tspan>
    </text>
  </g>
  <g class="seq-note">
    <rect x="-67.65" y="253.8" width="275.3" height="30" rx="3" />
    <text text-anchor="middle" x="70" y="268.8" dominant-baseline="central">5 seconds pass, phone reconnects</text>
  </g>
  <g class="seq-note">
    <rect x="206.45" y="368.8" width="327.1" height="68.8" rx="3" />
    <text text-anchor="middle" x="370" y="387.2" dominant-baseline="central">
      <tspan x="370" dy="0">watermark = 00:07</tspan>
      <tspan x="370" dy="16">window [00:00, 00:10) still not published</tspan>
      <tspan x="370" dy="16">B added to window</tspan>
    </text>
  </g>
  <g class="seq-note">
    <rect x="269.8" y="442.6" width="200.4" height="68.8" rx="3" />
    <text text-anchor="middle" x="370" y="461" dominant-baseline="central">
      <tspan x="370" dy="0">more events arrive</tspan>
      <tspan x="370" dy="16">watermark reaches 00:10</tspan>
      <tspan x="370" dy="16">time to publish</tspan>
    </text>
  </g>
  <g class="seq-note">
    <rect x="440.45" y="556.4" width="159.1" height="30" rx="3" />
    <text text-anchor="middle" x="520" y="571.4" dominant-baseline="central">both events counted</text>
  </g>
  <g class="seq-participant" data-participant-id="P">
    <rect x="20" y="20" width="100" height="40" rx="5" />
    <text x="70" y="40" text-anchor="middle" dominant-baseline="central">Producer</text>
  </g>
  <g class="seq-participant" data-participant-id="K">
    <rect x="170" y="20" width="100" height="40" rx="5" />
    <text x="220" y="40" text-anchor="middle" dominant-baseline="central">Kafka</text>
  </g>
  <g class="seq-participant" data-participant-id="F">
    <rect x="320" y="20" width="100" height="40" rx="5" />
    <text x="370" y="40" text-anchor="middle" dominant-baseline="central">Flink</text>
  </g>
  <g class="seq-participant" data-participant-id="PG">
    <rect x="469.75" y="20" width="100.5" height="40" rx="5" />
    <text x="520" y="40" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
  </g>
</svg>