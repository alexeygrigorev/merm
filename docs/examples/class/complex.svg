  </g>
  <g class="class-node" data-node-id="Repository">
    <rect x="28.0" y="260.0" width="164.0" height="110.0" fill="#ECECFF" stroke="#9370DB" stroke-width="1" />
    <text x="110.0" y="280.0" text-anchor="middle" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif, &quot;Apple Color Emoji&quot;, &quot;Segoe UI Emoji&quot;, &quot;Noto Color Emoji&quot;, &quot;Twemoji Mozilla&quot;" font-size="14.0px" font-weight="bold" fill="#333333">Repository</text>
    <line x1="28.0" y1="290.0" x2="192.0" y2="290.0" stroke="#9370DB" stroke-width="1" />
