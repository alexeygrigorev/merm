<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20.0 -20 634.3 520" width="634.3" height="520" style="background-color: white">
  <defs>
    <marker id="seq-arrow" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 6 2, 0 4" fill="#333333" />
    </marker>
    <marker id="seq-arrow-open" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0 0, 6 2, 0 4" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
    <marker id="seq-cross" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="6" y2="6" stroke="#333333" stroke-width="1.5" />
      <line x1="6" y1="0" x2="0" y2="6" stroke="#333333" stroke-width="1.5" />
    </marker>
    <marker id="seq-async" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0 0, 6 2, 0 4" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
  </defs>
  <style>.seq-participant rect { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-participant text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
.seq-lifeline { stroke: #9370DB; stroke-width: 1; stroke-dasharray: 5,5; }
.seq-message line, .seq-message path { stroke: #333333; stroke-width: 2; }
.seq-message text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-activation { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-note rect { fill: #ffffcc; stroke: #aaaa33; stroke-width: 1; }
.seq-note text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-fragment rect { fill: none; stroke: #9370DB; stroke-width: 1; stroke-dasharray: 3,3; }
.seq-fragment text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 11px; font-weight: bold; }
.seq-actor line, .seq-actor circle { stroke: #9370DB; stroke-width: 1; fill: none; }
.seq-actor text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
</style>
  <line class="seq-lifeline" x1="70" y1="60" x2="70" y2="470" />
  <line class="seq-lifeline" x1="223.9" y1="60" x2="223.9" y2="470" />
  <line class="seq-lifeline" x1="374.3" y1="60" x2="374.3" y2="470" />
  <line class="seq-lifeline" x1="524.3" y1="60" x2="524.3" y2="470" />
  <g class="seq-fragment">
    <rect x="10" y="140" width="574.3" height="115" />
    <rect x="10" y="140" width="42" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="154">LOOP</text>
    <text x="57" y="154">[Every minute]</text>
  </g>
  <g class="seq-fragment">
    <rect x="10" y="255" width="574.3" height="75" />
    <rect x="10" y="255" width="34" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="269">ALT</text>
    <text x="49" y="269">[Has data]</text>
  </g>
  <g class="seq-fragment">
    <rect x="10" y="330" width="574.3" height="75" />
    <rect x="10" y="330" width="42" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="344">ELSE</text>
    <text x="57" y="344">[No data]</text>
  </g>
  <g class="seq-fragment">
    <rect x="10" y="405" width="574.3" height="75" />
    <rect x="10" y="405" width="34" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="419">OPT</text>
    <text x="49" y="419">[Extra logging]</text>
  </g>
  <g class="seq-message">
    <line x1="70" y1="100" x2="223.9" y2="100" marker-end="url(#seq-arrow)" />
    <text x="146.95" text-anchor="middle" y="95">Request data</text>
  </g>
  <g class="seq-message">
    <line x1="223.9" y1="165" x2="374.3" y2="165" marker-end="url(#seq-arrow)" />
    <text x="299.1" text-anchor="middle" y="160">Poll for updates</text>
  </g>
  <g class="seq-message">
    <line x1="374.3" y1="205" x2="223.9" y2="205" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="299.1" text-anchor="middle" y="200">Response</text>
  </g>
  <g class="seq-message">
    <line x1="223.9" y1="280" x2="70" y2="280" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="146.95" text-anchor="middle" y="275">Here is the data</text>
  </g>
  <g class="seq-message">
    <line x1="223.9" y1="355" x2="70" y2="355" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="146.95" text-anchor="middle" y="350">No updates yet</text>
  </g>
  <g class="seq-message">
    <line x1="223.9" y1="430" x2="524.3" y2="430" marker-end="url(#seq-arrow)" />
    <text x="374.1" text-anchor="middle" y="425">Log result</text>
  </g>
  <g class="seq-participant" data-participant-id="Alice">
    <rect x="20" y="20" width="100" height="40" rx="5" />
    <text x="70" y="40" text-anchor="middle" dominant-baseline="central">Alice</text>
  </g>
  <g class="seq-participant" data-participant-id="Bob">
    <rect x="173.9" y="20" width="100" height="40" rx="5" />
    <text x="223.9" y="40" text-anchor="middle" dominant-baseline="central">Bob</text>
  </g>
  <g class="seq-participant" data-participant-id="Server">
    <rect x="324.3" y="20" width="100" height="40" rx="5" />
    <text x="374.3" y="40" text-anchor="middle" dominant-baseline="central">Server</text>
  </g>
  <g class="seq-participant" data-participant-id="Logger">
    <rect x="474.3" y="20" width="100" height="40" rx="5" />
    <text x="524.3" y="40" text-anchor="middle" dominant-baseline="central">Logger</text>
  </g>
</svg>