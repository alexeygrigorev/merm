<svg xmlns="http://www.w3.org/2000/svg" viewBox="-92.55000000000001 -20 1073.3 827.6" width="1073.3" height="827.6" style="background-color: white">
  <defs>
    <marker id="seq-arrow" markerWidth="4" markerHeight="3" refX="4" refY="1.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 4 1.5, 0 3" fill="#333333" />
    </marker>
    <marker id="seq-arrow-open" markerWidth="4" markerHeight="3" refX="4" refY="1.5" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0 0, 4 1.5, 0 3" fill="none" stroke="#333333" stroke-width="1" />
    </marker>
    <marker id="seq-cross" markerWidth="4" markerHeight="4" refX="2" refY="2" orient="auto" markerUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="4" stroke="#333333" stroke-width="1" />
      <line x1="4" y1="0" x2="0" y2="4" stroke="#333333" stroke-width="1" />
    </marker>
    <marker id="seq-async" markerWidth="4" markerHeight="3" refX="4" refY="1.5" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0 0, 4 1.5, 0 3" fill="none" stroke="#333333" stroke-width="1" />
    </marker>
  </defs>
  <style>.seq-participant rect { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-participant text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
.seq-lifeline { stroke: #9370DB; stroke-width: 1; stroke-dasharray: 5,5; }
.seq-message line, .seq-message path { stroke: #333333; stroke-width: 1; }
.seq-message text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-activation { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-note rect { fill: #ffffcc; stroke: #aaaa33; stroke-width: 1; }
.seq-note text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 12px; }
.seq-fragment rect { fill: none; stroke: #9370DB; stroke-width: 1; stroke-dasharray: 3,3; }
.seq-fragment text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 11px; font-weight: bold; }
.seq-actor line, .seq-actor circle { stroke: #9370DB; stroke-width: 1; fill: none; }
.seq-actor text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; font-size: 14px; }
</style>
  <line class="seq-lifeline" x1="70" y1="60" x2="70" y2="777.6" />
  <line class="seq-lifeline" x1="342.9" y1="60" x2="342.9" y2="777.6" />
  <line class="seq-lifeline" x1="520.05" y1="60" x2="520.05" y2="777.6" />
  <line class="seq-lifeline" x1="854.55" y1="60" x2="854.55" y2="777.6" />
  <g class="seq-message">
    <line x1="70" y1="100" x2="342.9" y2="100" marker-end="url(#seq-arrow)" />
    <text x="206.45" text-anchor="middle" y="95">Event A (ts=14:00:07, on time)</text>
  </g>
  <g class="seq-message">
    <line x1="342.9" y1="140" x2="520.05" y2="140" marker-end="url(#seq-arrow)" />
    <text x="431.47" text-anchor="middle" y="135">Event A</text>
  </g>
  <g class="seq-message">
    <line x1="520.05" y1="327.2" x2="854.55" y2="327.2" marker-end="url(#seq-arrow)" />
    <text x="687.3" text-anchor="middle" y="322.2">INSERT (window=00:00, PU=79, trips=1)</text>
  </g>
  <g class="seq-message">
    <line x1="70" y1="495.2" x2="342.9" y2="495.2" marker-end="url(#seq-arrow)" />
    <text x="206.45" text-anchor="middle" y="490.2">Event B (ts=14:00:04, 20s late)</text>
  </g>
  <g class="seq-message">
    <line x1="342.9" y1="535.2" x2="520.05" y2="535.2" marker-end="url(#seq-arrow)" />
