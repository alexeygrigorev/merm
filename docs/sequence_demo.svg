<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 480 530" width="480" height="530" style="background-color: white">
  <defs>
    <marker id="seq-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333" />
    </marker>
    <marker id="seq-arrow-open" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
    <marker id="seq-cross" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" stroke="#333333" stroke-width="2" />
      <line x1="10" y1="0" x2="0" y2="10" stroke="#333333" stroke-width="2" />
    </marker>
    <marker id="seq-async" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#333333" stroke-width="1.5" />
    </marker>
  </defs>
  <style>.seq-participant rect { fill: #ECECFF; stroke: #9370DB; stroke-width: 2; }
.seq-participant text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif; font-size: 14px; }
.seq-lifeline { stroke: #9370DB; stroke-width: 1; stroke-dasharray: 5,5; }
.seq-message line, .seq-message path { stroke: #333333; stroke-width: 2; }
.seq-message text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif; font-size: 12px; }
.seq-activation { fill: #ECECFF; stroke: #9370DB; stroke-width: 1; }
.seq-note rect { fill: #ffffcc; stroke: #aaaa33; stroke-width: 1; }
.seq-note text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif; font-size: 12px; }
.seq-fragment rect { fill: none; stroke: #9370DB; stroke-width: 1; stroke-dasharray: 3,3; }
.seq-fragment text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif; font-size: 11px; font-weight: bold; }
.seq-actor line, .seq-actor circle { stroke: #9370DB; stroke-width: 2; fill: none; }
.seq-actor text { fill: #333333; font-family: "trebuchet ms", verdana, arial, sans-serif; font-size: 14px; }
</style>
  <line class="seq-lifeline" x1="70" y1="60" x2="70" y2="470" />
  <line class="seq-lifeline" x1="220" y1="60" x2="220" y2="470" />
  <line class="seq-lifeline" x1="370" y1="60" x2="370" y2="470" />
  <g class="seq-fragment">
    <rect x="10" y="335" width="420" height="115" />
    <rect x="10" y="335" width="42" height="20" fill="#e8e8e8" stroke="none" />
    <text x="15" y="349">LOOP</text>
    <text x="57" y="349">[Every morning]</text>
  </g>
  <g class="seq-activation">
    <rect x="365" y="220" width="10" height="40" rx="2" />
  </g>
  <g class="seq-activation">
    <rect x="215" y="140" width="10" height="120" rx="2" />
  </g>
  <g class="seq-message">
    <line x1="70" y1="100" x2="220" y2="100" marker-end="url(#seq-arrow)" />
    <text x="145" y="95" text-anchor="middle">Hello Bob!</text>
  </g>
  <g class="seq-message">
    <line x1="220" y1="140" x2="70" y2="140" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="145" y="135" text-anchor="middle">Hi Alice!</text>
  </g>
  <g class="seq-message">
    <line x1="220" y1="180" x2="370" y2="180" marker-end="url(#seq-arrow)" />
    <text x="295" y="175" text-anchor="middle">Hey Charlie</text>
  </g>
  <g class="seq-message">
    <line x1="370" y1="220" x2="220" y2="220" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="295" y="215" text-anchor="middle">What's up?</text>
  </g>
  <g class="seq-message">
    <line x1="70" y1="260" x2="370" y2="260" marker-end="url(#seq-arrow)" />
    <text x="220" y="255" text-anchor="middle">Direct message</text>
  </g>
  <g class="seq-message">
    <line x1="70" y1="360" x2="220" y2="360" marker-end="url(#seq-arrow)" />
    <text x="145" y="355" text-anchor="middle">Good morning!</text>
  </g>
  <g class="seq-message">
    <line x1="220" y1="400" x2="70" y2="400" marker-end="url(#seq-arrow)" stroke-dasharray="5,5" />
    <text x="145" y="395" text-anchor="middle">Morning!</text>
  </g>
  <g class="seq-note">
    <rect x="60" y="300" width="170" height="30" rx="3" />
    <text x="145" y="315" text-anchor="middle" dominant-baseline="central">Friends since 2020</text>
  </g>
  <g class="seq-participant" data-participant-id="A">
    <rect x="20" y="20" width="100" height="40" rx="5" />
    <text x="70" y="40" text-anchor="middle" dominant-baseline="central">Alice</text>
  </g>
  <g class="seq-participant" data-participant-id="B">
    <rect x="170" y="20" width="100" height="40" rx="5" />
    <text x="220" y="40" text-anchor="middle" dominant-baseline="central">Bob</text>
  </g>
  <g class="seq-participant" data-participant-id="C">
    <rect x="320" y="20" width="100" height="40" rx="5" />
    <text x="370" y="40" text-anchor="middle" dominant-baseline="central">Charlie</text>
  </g>
</svg>