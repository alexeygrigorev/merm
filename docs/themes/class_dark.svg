<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 326 240" width="326" height="240" style="background-color: #1f2020">
  <defs>
    <marker id="inherit-arrow" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="white" stroke="#cccccc" stroke-width="1" />
    </marker>
    <marker id="composition-arrow" viewBox="0 0 16 10" markerWidth="16" markerHeight="10" refX="16" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,5 L8,0 L16,5 L8,10 Z" fill="#cccccc" stroke="#cccccc" stroke-width="1" />
    </marker>
    <marker id="aggregation-arrow" viewBox="0 0 16 10" markerWidth="16" markerHeight="10" refX="16" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,5 L8,0 L16,5 L8,10 Z" fill="white" stroke="#cccccc" stroke-width="1" />
    </marker>
    <marker id="association-arrow" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#cccccc" stroke-width="1.5" />
    </marker>
    <marker id="dependency-arrow" viewBox="0 0 10 7" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7" fill="none" stroke="#cccccc" stroke-width="1.5" />
    </marker>
    <marker id="realization-arrow" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="white" stroke="#cccccc" stroke-width="1" />
    </marker>
  </defs>
  <style>.class-node rect { fill: #1f2937; stroke: #4a6785; stroke-width: 1; }
.class-node text { fill: #cccccc; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; }
.class-node line { stroke: #4a6785; }
.class-edge path { fill: none; stroke: #cccccc; stroke-width: 2; }
.class-edge text { fill: #cccccc; font-family: "trebuchet ms", verdana, arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla"; }
</style>
  <g class="class-edge" data-edge-source="Dog" data-edge-target="Animal">
    <path d="M66.0,130.0 L143.0,90.0" fill="none" stroke="#cccccc" stroke-width="2" marker-end="url(#inherit-arrow)" />
  </g>
  <g class="class-edge" data-edge-source="Cat" data-edge-target="Animal">
    <path d="M224.0,130.0 L143.0,90.0" fill="none" stroke="#cccccc" stroke-width="2" marker-end="url(#inherit-arrow)" />
  </g>
  <g class="class-node" data-node-id="Animal">
    <rect x="81.0" y="0.0" width="124.0" height="90.0" fill="#1f2937" stroke="#4a6785" stroke-width="1" />
    <text x="143.0" y="20.0" text-anchor="middle" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif, &quot;Apple Color Emoji&quot;, &quot;Segoe UI Emoji&quot;, &quot;Noto Color Emoji&quot;, &quot;Twemoji Mozilla&quot;" font-size="14.0px" font-weight="bold" fill="#cccccc">Animal</text>
