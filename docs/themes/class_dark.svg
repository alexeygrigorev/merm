  </g>
  <g class="class-node" data-node-id="Cat">
    <rect x="162.0" y="130.0" width="124.0" height="70.0" fill="#1f2937" stroke="#4a6785" stroke-width="1" />
    <text x="224.0" y="150.0" text-anchor="middle" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif, &quot;Apple Color Emoji&quot;, &quot;Segoe UI Emoji&quot;, &quot;Noto Color Emoji&quot;, &quot;Twemoji Mozilla&quot;" font-size="14.0px" font-weight="bold" fill="#cccccc">Cat</text>
