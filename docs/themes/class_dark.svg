    <line x1="0.0" y1="160.0" x2="132.0" y2="160.0" stroke="#4a6785" stroke-width="1" />
    <text x="10.0" y="170.0" dominant-baseline="central" font-family="&quot;trebuchet ms&quot;, verdana, arial, sans-serif, &quot;Apple Color Emoji&quot;, &quot;Segoe UI Emoji&quot;, &quot;Noto Color Emoji&quot;, &quot;Twemoji Mozilla&quot;" font-size="12.0px" fill="#cccccc">+String: breed</text>
    <line x1="0.0" y1="180.0" x2="132.0" y2="180.0" stroke="#4a6785" stroke-width="1" />
